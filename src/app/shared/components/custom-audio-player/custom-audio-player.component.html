<div class="audio-player outline-none bg-indigo-50/50 dark:bg-indigo-900/20 border border-indigo-100 dark:border-indigo-800/30 rounded-full flex items-center pr-4 pl-1 py-1 gap-2 w-full max-w-[280px]">
  <audio #audioElement [src]="src" class="hidden" preload="metadata"></audio>

  <button mat-icon-button (click)="togglePlay()" color="primary" class="shrink-0 w-8 h-8 flex items-center justify-center bg-white dark:bg-slate-800 shadow-sm rounded-full bg-linear-to-br from-indigo-50 to-white dark:from-indigo-900/40 dark:to-slate-800 z-10">
    <mat-icon class="icon-sm" style="color: var(--color-primary); font-size: 20px; width: 20px; height: 20px; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center;">
      {{ isPlaying() ? 'pause' : 'play_arrow' }}
    </mat-icon>
  </button>

  <div class="flex-1 min-w-0 flex items-center gap-3">
    <!-- Progress Wrapper -->
    <div class="progress-bar flex-1 h-1.5 bg-indigo-200/50 dark:bg-slate-700/50 rounded-full cursor-pointer relative overflow-hidden" 
         (click)="seekTo($event)" (touchstart)="seekTo($event)">
      <!-- Filled Progress -->
      <div class="progress-filled absolute top-0 left-0 bottom-0 bg-indigo-500 rounded-full" 
           [style.width.%]="progressPercentage()">
      </div>
    </div>
    
    <!-- Timer -->
    <div class="timer text-xs font-mono shrink-0" style="color: var(--text-muted)">
      {{ formattedCurrentTime() }} / {{ formattedDuration() }}
    </div>
  </div>
</div>

<div class="auth-page min-h-screen flex items-center justify-center p-4 sm:p-6 relative overflow-hidden">
  <!-- Background Effects -->
  <div class="auth-glow-1 absolute top-0 right-1/4 w-96 h-96 rounded-full blur-[128px] pointer-events-none"></div>
  <div class="auth-glow-2 absolute bottom-0 left-1/4 w-96 h-96 rounded-full blur-[128px] pointer-events-none"></div>

  <!-- Register Card -->
  <div class="w-full max-w-md relative z-10 animate-fade-in">
    <div class="text-center mb-8">
      <h1 class="auth-heading text-3xl font-bold mb-2">Create Account</h1>
      <p class="auth-subtext">Join TaskFlow and start organizing today</p>
    </div>

    <mat-card class="glass-panel p-6 sm:p-8">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <mat-form-field appearance="outline">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" placeholder="John">
            <mat-error *ngIf="registerForm.get('firstName')?.hasError('required')">Required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName" placeholder="Doe">
            <mat-error *ngIf="registerForm.get('lastName')?.hasError('required')">Required</mat-error>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" placeholder="name@company.com">
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Invalid email address</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="••••••••">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" class="suffix-btn">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Min 6 characters</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="h-12 text-lg mt-2" [disabled]="registerForm.invalid || loading">
          @if (loading) {
            <mat-spinner diameter="24" class="mr-2"></mat-spinner>
          }
          Create Account
        </button>
      </form>

      <div class="auth-footer mt-8 text-center">
        Already have an account?
        <a routerLink="/login" class="auth-link font-medium no-underline transition-colors">Sign in</a>
      </div>
    </mat-card>
  </div>
</div>

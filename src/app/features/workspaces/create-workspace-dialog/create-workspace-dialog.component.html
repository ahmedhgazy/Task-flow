<div class="dialog-wrapper p-4 sm:p-6">
  <h2 class="text-2xl font-bold mb-4">Create Workspace</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="w-full mb-4">
      <mat-label>Workspace Name</mat-label>
      <input matInput formControlName="name" placeholder="My Awesome Project">
      @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full mb-6">
      <mat-label>Description (Optional)</mat-label>
      <textarea matInput formControlName="description" rows="3"
                placeholder="A brief description of this workspace"></textarea>
    </mat-form-field>

    <div class="flex justify-end gap-3">
      <button mat-button type="button" (click)="dialogRef.close()">Cancel</button>
      <button mat-raised-button color="primary" type="submit"
              [disabled]="loading || form.invalid">
        @if (loading) {
          <mat-spinner diameter="20" class="inline-block mr-2"></mat-spinner>
        }
        Create
      </button>
    </div>
  </form>
</div>

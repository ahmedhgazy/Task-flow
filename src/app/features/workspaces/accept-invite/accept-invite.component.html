<div class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative overflow-hidden" style="background: var(--color-bg-primary)">
  <!-- Background Elements -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
      <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-pulse"></div>
      <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl animate-pulse" style="animation-delay: 2s"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4 shadow-lg transform rotate-3">
            <mat-icon class="text-white text-3xl">task_alt</mat-icon>
        </div>
        <h1 class="text-3xl font-bold tracking-tight" style="color: var(--text-main)">TaskFlow</h1>
    </div>

    <div class="glass-panel p-6 sm:p-8">
      @if (loading()) {
        <div class="flex flex-col items-center justify-center py-8">
          <mat-spinner diameter="40"></mat-spinner>
          <p class="mt-4" style="color: var(--text-muted)">processing parameters...</p>
        </div>
      } @else if (error()) {
         <div class="text-center">
            <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4">
              <mat-icon class="text-red-500 text-3xl">error_outline</mat-icon>
            </div>
            <h2 class="text-xl font-semibold mb-2" style="color: var(--text-main)">Invitation Failed</h2>
            <p class="mb-6" style="color: var(--text-muted)">{{ errorMessage }}</p>
            <a routerLink="/" mat-flat-button color="primary">Go Home</a>
         </div>
      } @else if (processing()) {
         <div class="flex flex-col items-center justify-center py-8">
          <mat-spinner diameter="40"></mat-spinner>
          <p class="mt-4" style="color: var(--text-muted)">Joining workspace...</p>
        </div>
      } @else {
         <div class="text-center">
            <div class="w-16 h-16 rounded-full bg-slate-500/20 flex items-center justify-center mx-auto mb-4">
              <mat-icon class="text-indigo-400 text-3xl">mail</mat-icon>
            </div>
            <h2 class="text-xl font-semibold mb-2" style="color: var(--text-main)">You're Invited!</h2>
            <p class="mb-6" style="color: var(--text-muted)">You have been invited to join a workspace.</p>

            <div class="flex flex-col gap-3">
              <button mat-flat-button color="primary" class="w-full h-12 text-lg" (click)="acceptInvitation()">
                Accept Invitation
              </button>
              <a routerLink="/" mat-button class="w-full" style="color: var(--text-muted)">Cancel</a>
            </div>
         </div>
      }
    </div>
  </div>
</div>

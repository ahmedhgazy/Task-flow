<div class="dialog-wrapper p-4 sm:p-6">
  <h2 class="text-2xl font-bold mb-4">Create Board</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="w-full mb-4">
      <mat-label>Board Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter board name">
      @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full mb-4">
      <mat-label>Description (Optional)</mat-label>
      <textarea matInput formControlName="description" rows="2"></textarea>
    </mat-form-field>

    <div class="mb-6">
      <label class="block text-sm text-gray-300 mb-2" style="color: var(--text-muted)">Background Color</label>
      <div class="flex flex-wrap gap-2">
        @for (color of colors; track color) {
          <button type="button"
                  class="w-10 h-10 rounded-lg cursor-pointer transition-transform hover:scale-110"
                  [style.backgroundColor]="color"
                  [class.ring-2]="selectedColor === color"
                  [class.ring-white]="selectedColor === color"
                  (click)="selectColor(color)">
          </button>
        }
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <button mat-button type="button" (click)="dialogRef.close()">Cancel</button>
      <button mat-raised-button color="primary" type="submit"
              [disabled]="loading || form.invalid">
        @if (loading) {
          <mat-spinner diameter="20" class="inline-block mr-2"></mat-spinner>
        }
        Create
      </button>
    </div>
  </form>
</div>
